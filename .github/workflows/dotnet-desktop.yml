name: Build and Release

on:
  push:
    branches: [ master ]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-winforms:
    runs-on: windows-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 10.0.x

      - name: Restore
        run: dotnet restore

      - name: Build
        run: dotnet build LTDSaveEditor.WinForms/LTDSaveEditor.WinForms.csproj -c Release --no-restore

      - name: Publish WinForms
        run: >
          dotnet publish LTDSaveEditor.WinForms/LTDSaveEditor.WinForms.csproj
          -c Release
          -r win-x64
          --self-contained false
          -o publish/win-x64

      - name: Zip WinForms
        shell: pwsh
        run: Compress-Archive -Path publish/win-x64/* -DestinationPath LTDSaveEditor-Windows-WinForms.zip

      - name: Upload Windows artifact
        uses: actions/upload-artifact@v4
        with:
          name: LTDSaveEditor-Windows-WinForms
          path: LTDSaveEditor-Windows-WinForms.zip

  build-avalonia:
    strategy:
      matrix:
        include:
          - os: ubuntu-latest
            rid: linux-x64
            name: Linux-x64
          - os: macos-latest
            rid: osx-x64
            name: macOS-x64
          - os: macos-latest
            rid: osx-arm64
            name: macOS-arm64
          - os: windows-latest
            rid: win-x64
            name: windows-x64

    runs-on: ${{ matrix.os }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 10.0.x

      - name: Restore Avalonia
        run: dotnet restore LTDSaveEditor.Avalonia/LTDSaveEditor.Avalonia.csproj -r ${{ matrix.rid }}

      - name: Build Avalonia
        run: dotnet build LTDSaveEditor.Avalonia/LTDSaveEditor.Avalonia.csproj -c Release --no-restore

      - name: Publish Avalonia
        run: >
          dotnet publish LTDSaveEditor.Avalonia/LTDSaveEditor.Avalonia.csproj
          -c Release
          -r ${{ matrix.rid }}
          --self-contained true
          -p:PublishSingleFile=true
          -p:PublishAot=true
          -o publish/${{ matrix.rid }}
          --no-restore

      - name: Zip output
        shell: pwsh
        run: Compress-Archive -Path publish/${{ matrix.rid }}/* -DestinationPath LTDSaveEditor-${{ matrix.name }}.zip

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: LTDSaveEditor-${{ matrix.name }}
          path: LTDSaveEditor-${{ matrix.name }}.zip

  release:
    needs: [build-winforms, build-avalonia]
    runs-on: ubuntu-latest

    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Create GitHub Release
        id: create_release
        uses: actions/create-release@v1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tag_name: Build_${{ github.run_number }}
          release_name: (Automatic) Build ${{ github.run_number }}
          body: Automated release for commit ${{ github.sha }}
          draft: false
          prerelease: false

      - name: Upload Windows
        uses: actions/upload-release-asset@v1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          upload_url: ${{ steps.create_release.outputs.upload_url }}
          asset_path: artifacts/LTDSaveEditor-Windows-WinForms/LTDSaveEditor-Windows-WinForms.zip
          asset_name: LTDSaveEditor-Windows-WinForms.zip
          asset_content_type: application/zip

      - name: Upload Linux
        uses: actions/upload-release-asset@v1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          upload_url: ${{ steps.create_release.outputs.upload_url }}
          asset_path: artifacts/LTDSaveEditor-Linux-x64/LTDSaveEditor-Linux-x64.zip
          asset_name: LTDSaveEditor-Linux-x64.zip
          asset_content_type: application/zip

      - name: Upload macOS x64
        uses: actions/upload-release-asset@v1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          upload_url: ${{ steps.create_release.outputs.upload_url }}
          asset_path: artifacts/LTDSaveEditor-macOS-x64/LTDSaveEditor-macOS-x64.zip
          asset_name: LTDSaveEditor-macOS-x64.zip
          asset_content_type: application/zip

      - name: Upload macOS arm64
        uses: actions/upload-release-asset@v1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          upload_url: ${{ steps.create_release.outputs.upload_url }}
          asset_path: artifacts/LTDSaveEditor-macOS-arm64/LTDSaveEditor-macOS-arm64.zip
          asset_name: LTDSaveEditor-macOS-arm64.zip
          asset_content_type: application/zip

      - name: Upload Windows x64
        uses: actions/upload-release-asset@v1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          upload_url: ${{ steps.create_release.outputs.upload_url }}
          asset_path: artifacts/LTDSaveEditor-windows-x64/LTDSaveEditor-windows-x64.zip
          asset_name: LTDSaveEditor-Windows-x64.zip
          asset_content_type: application/zip